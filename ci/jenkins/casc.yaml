jenkins:
  systemMessage: "Ian Portfolio Jenkins - 多分支自动构建部署"
  numExecutors: 2
  mode: NORMAL

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD:-admin123}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "gitee-credentials"
              username: "${GITEE_USER}"
              password: "${GITEE_TOKEN}"
              description: "Gitee 访问令牌"
          - string:
              scope: GLOBAL
              id: "tianditu-token"
              secret: "${VITE_TIANDITU_TOKEN}"
              description: "天地图令牌"
